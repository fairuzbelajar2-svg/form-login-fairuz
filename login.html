<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
}


.login-card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    animation: fadeIn 1s ease-in-out;
}

.form-control {
    border-radius: 10px;
}

.btn-primary {
    background: #ff7eb3;
    border: none;
}
.btn-primary:hover {
    background: #ff4f91;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


.input-group-text {
    background: transparent;
    color: white;
    border: none;
}

.toggle-password {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 col-sm-8">
            <div class="card login-card shadow-lg p-4">
                <div class="card-body">
                    
                    <h3 class="text-center mb-4">
                        <i class="fa-solid fa-user-circle"></i> Login
                    </h3>

                    <form id="loginForm">

                       
                        <div class="mb-3 input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-user"></i>
                            </span>
                            <input type="text" 
                                class="form-control" 
                                id="username"
                                placeholder="Username"
                                required>
                        </div>

                        
                        <div class="mb-3 input-group">
                            <span class="input-group-text">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password"
                                class="form-control" 
                                id="password"
                                placeholder="Password"
                                required>
                            <span class="input-group-text toggle-password" onclick="togglePassword()">
                                <i class="fa-solid fa-eye"></i>
                            </span>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                Login
                            </button>
                            <button type="reset" class="btn btn-light btn-lg">
                                Reset
                            </button>
                        </div>

                      
                        <p class="text-center mt-3">
                            <small>Belum punya akun? <a href="#" class="text-white">Daftar</a></small>
                        </p>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
window.addEventListener('load', function() {
    setTimeout(() => {
        alert("Selamat datang di halaman login modern!");
    }, 500);
});


function togglePassword() {
    const pass = document.getElementById('password');
    pass.type = pass.type === 'password' ? 'text' : 'password';
}


document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if (username && password) {
        alert('Login berhasil! Welcome ' + username);
    } else {
        alert('Isi semua field!');
    }
});
</script>

</body>
</html>
